<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Morita</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #7dd3fc;
      --border: rgba(255, 255, 255, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(125, 211, 252, 0.16), transparent 32%),
        radial-gradient(circle at bottom right, rgba(167, 139, 250, 0.14), transparent 32%),
        var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    main {
      width: 100%;
      max-width: 860px;
      border: 1px solid var(--border);
      background: rgba(17, 24, 39, 0.72);
      backdrop-filter: blur(18px);
      border-radius: 28px;
      padding: 48px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      color: var(--accent);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
      margin-bottom: 28px;
    }

    h1 {
      font-size: clamp(42px, 8vw, 82px);
      line-height: 0.95;
      margin: 0 0 24px;
      letter-spacing: -0.06em;
    }

    p {
      font-size: clamp(18px, 2.5vw, 23px);
      line-height: 1.65;
      color: var(--muted);
      margin: 0 0 32px;
      max-width: 680px;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 36px;
    }

    a {
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--border);
      padding: 12px 18px;
      border-radius: 14px;
      transition: 0.2s ease;
    }

    a:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
    }

    footer {
      margin-top: 48px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 640px) {
      main {
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="badge">🌱 GitHub Pages is alive</div>

    <h1>Morita</h1>

    <p>
      A quiet space for building, sharing, and leaving small traces of meaningful work on the open web.
    </p>

    <div class="links">
      <a href="https://github.com/qiao" target="_blank" rel="noopener noreferrer">GitHub</a>
      <a href="mailto:">Contact</a>
    </div>

    <footer>
      Built with GitHub Pages.
    </footer>
  </main>
</body>
</html>
